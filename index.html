<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tif - White Label</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* Importante para não aparecer barra de rolagem lateral */
            background-color: #f5f5f5; 
        }

        .dash-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Isso vai "cortar" o que passar da tela */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Fazemos o iframe ser maior que a tela para empurrar o rodapé para baixo */
            height: calc(100% + 36px); 
            border: none;
            transition: opacity 0.2s ease-in-out;
        }

        /* Dash Ativo */
        .active { z-index: 10; opacity: 1; }

        /* Dash em Background */
        .background { z-index: 1; opacity: 0; pointer-events: none; }

        .btn-toggle {
            position: fixed;
            bottom: 50px; /* Subi um pouco para o botão não ficar perto do corte */
            right: 30px;
            z-index: 999999 !important;
            padding: 15px 25px;
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="dash-viewport">
        <iframe 
            id="dashFull" 
            class="active"
            src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/TmTqF?navBar=hidden" 
            allowfullscreen>
        </iframe>

        <iframe 
            id="dashLite" 
            class="background"
            src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/p_7h5qse5b1d?navBar=hidden" 
            allowfullscreen>
        </iframe>
    </div>

    <button id="btnMain" class="btn-toggle" onclick="toggleDash()">Esconder Detalhes</button>

    <script>
        function toggleDash() {
            const full = document.getElementById('dashFull');
            const lite = document.getElementById('dashLite');
            const btn = document.getElementById('btnMain');

            if (full.classList.contains('active')) {
                full.classList.replace('active', 'background');
                lite.classList.replace('background', 'active');
                btn.innerText = "Mostrar Detalhes";
            } else {
                lite.classList.replace('active', 'background');
                full.classList.replace('background', 'active');
                btn.innerText = "Esconder Detalhes";
            }
        }
    </script>
</body>
</html>
