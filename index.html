<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tif - Dinâmico</title>
    <style>
        /* Reset básico para ocupar a tela toda */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container dos Dashboards */
        .dash-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Configuração dos IFrames */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            transition: opacity 0.5s ease-in-out; /* Transição suave entre as visões */
        }

        /* Classe para ocultar o dashboard sem descarregá-lo */
        .hidden {
            opacity: 0;
            pointer-events: none; /* Garante que o iframe invisível não bloqueie cliques */
        }

        /* Botão Flutuante Estilizado */
        .btn-toggle {
            position: fixed;
            bottom: 30px; /* Posicionado embaixo para não cobrir filtros do topo */
            right: 30px;
            z-index: 999999 !important; /* Prioridade máxima sobre o Looker */
            padding: 15px 25px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .btn-toggle:hover {
            background-color: #333333;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.5);
        }

        .btn-toggle:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="dash-container">
        <iframe 
            id="dashFull" 
            src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/TmTqF?navBar=hidden" 
            allowfullscreen 
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
        </iframe>

        <iframe 
            id="dashLite" 
            class="hidden"
            src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/p_7h5qse5b1d?navBar=hidden" 
            allowfullscreen 
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
        </iframe>
    </div>

    <button id="btnMain" class="btn-toggle" onclick="toggleDash()">Esconder Gráfico</button>

    <script>
        function toggleDash() {
            const full = document.getElementById('dashFull');
            const lite = document.getElementById('dashLite');
            const btn = document.getElementById('btnMain');

            // Alterna a visibilidade
            full.classList.toggle('hidden');
            lite.classList.toggle('hidden');

            // Altera o texto do botão conforme a página ativa
            if (full.classList.contains('hidden')) {
                btn.innerText = "Mostrar Gráfico";
                btn.style.backgroundColor = "#2ecc71"; // Muda para verde quando está na visão simplificada
            } else {
                btn.innerText = "Esconder Gráfico";
                btn.style.backgroundColor = "#000000"; // Volta para preto
            }
        }
    </script>

</body>
</html>
