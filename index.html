<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tif - Rio Bonito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #f5f5f5; /* Cor de fundo padrão do Looker */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
        }

        /* Container Principal do Dash */
        .main-content {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -2px; 
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 50px); /* Esconde o rodapé estático do Looker */
            border: none;
            transition: opacity 0.3s ease-in-out;
        }

        /* Classes de Visibilidade */
        .active { z-index: 10; opacity: 1; }
        .background { z-index: 1; opacity: 0; pointer-events: none; }

        /* Menu Flutuante na Direita (Área do X) */
        .floating-menu {
            position: fixed;
            right: 60px; /* Recuo da borda direita conforme solicitado */
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
            opacity: 0; /* Começa invisível para o delay de carregamento */
            transition: opacity 0.8s ease-in-out;
        }

        /* Botão Suave Estilo Tab */
        .btn-tab {
            width: 140px;
            padding: 10px 12px;
            background-color: #ffffff;
            color: #5f6368;
            border: 1px solid #dadce0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1);
            transition: all 0.2s ease;
        }

        .btn-tab:hover {
            background-color: #f8f9fa;
            border-color: #2e7d32;
            color: #2e7d32;
        }

        /* Aba Ativa (Verde Itambé Suave) */
        .btn-tab.active-tab {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #2e7d32;
        }

        /* Bloqueio do rodapé flutuante (Hover do Looker) */
        .mouse-blocker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px;
            z-index: 100;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="mouse-blocker"></div>

        <iframe id="rio_meta" class="active" src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/TmTqF"></iframe>
        <iframe id="rio_google" class="background" src="LINK_EMBED_GOOGLE_RIO_BONITO"></iframe>
        <iframe id="rio_linkedin" class="background" src="LINK_EMBED_LINKEDIN_RIO_BONITO"></iframe>
        <iframe id="rio_search" class="background" src="LINK_EMBED_SEARCH_RIO_BONITO"></iframe>
        <iframe id="rio_ga4" class="background" src="LINK_EMBED_GA4_RIO_BONITO"></iframe>

        <div id="ui-menu" class="floating-menu">
            <button class="btn-tab active-tab" onclick="changeDash('rio_meta', this)">Meta Ads</button>
            <button class="btn-tab" onclick="changeDash('rio_google', this)">Google Ads</button>
            <button class="btn-tab" onclick="changeDash('rio_linkedin', this)">LinkedIn</button>
            <button class="btn-tab" onclick="changeDash('rio_search', this)">Search</button>
            <button class="btn-tab" onclick="changeDash('rio_ga4', this)">Analytics</button>
        </div>
    </div>

    <script>
        // O menu aparece suavemente após o carregamento inicial da página
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('ui-menu').style.opacity = '1';
            }, 800);
        };

        // Função de troca instantânea entre os iframes
        function changeDash(targetId, btnElement) {
            document.querySelectorAll('iframe').forEach(iframe => {
                iframe.classList.replace('active', 'background');
            });
            const target = document.getElementById(targetId);
            if(target) target.classList.replace('background', 'active');

            // Atualiza o destaque do botão
            document.querySelectorAll('.btn-tab').forEach(btn => {
                btn.classList.remove('active-tab');
            });
            btnElement.classList.add('active-tab');
        }
    </script>
</body>
</html>
