<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tif - Dinâmico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }

        /* Container que segura os dois dashes */
        .dash-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Estilo comum aos iframes */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            transition: opacity 0.4s ease-in-out; /* Suaviza a troca */
        }

        /* Classe que esconde o dash */
        .hidden {
            opacity: 0;
            pointer-events: none; /* Desativa interação enquanto escondido */
        }

        /* Botão estilizado */
        .btn-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            padding: 12px 24px;
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-toggle:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <button class="btn-toggle" onclick="toggleDash()">Alternar Visualização</button>

    <div class="dash-container">
        <iframe 
            id="dashFull" 
            src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/TmTqF?navBar=hidden" 
            allowfullscreen>
        </iframe>

        <iframe 
            id="dashLite" 
            class="hidden"
            src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/p_7h5qse5b1d?navBar=hidden" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        function toggleDash() {
            const full = document.getElementById('dashFull');
            const lite = document.getElementById('dashLite');

            // Alterna a classe hidden entre os dois
            full.classList.toggle('hidden');
            lite.classList.toggle('hidden');
        }
    </script>

</body>
</html>
