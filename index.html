<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Performance - Grupo Itambé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #004a20; /* Verde escuro Itambé */
            font-family: 'Segoe UI', sans-serif;
            display: flex;
        }

        /* Menu Lateral Imediato */
        .sidebar {
            width: 220px;
            height: 100%;
            background-color: #003316;
            display: flex;
            flex-direction: column;
            padding: 30px 15px;
            gap: 12px;
            z-index: 1000;
            border-right: 2px solid #2ecc71;
        }

        .sidebar h2 {
            color: #2ecc71;
            font-size: 11px;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Área do Dashboard */
        .main-content {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -2px; 
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 48px); /* Esconde o rodapé flutuante */
            border: none;
            transition: opacity 0.2s ease-in-out;
        }

        .active { z-index: 10; opacity: 1; }
        .background { z-index: 1; opacity: 0; pointer-events: none; }

        /* Botões Estilo Itambé (Preto com Borda Verde) */
        .btn-nav {
            padding: 14px;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #2ecc71;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: left;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-nav:hover {
            background-color: #2ecc71;
            color: #004a20;
            transform: translateX(5px);
        }

        .btn-nav.active-btn {
            background-color: #2ecc71;
            color: #004a20;
            border-left: 5px solid #ffffff;
        }

        /* Bloqueador de Mouse para esconder rodapé */
        .mouse-blocker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            z-index: 100;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Relatórios</h2>
        <button class="btn-nav active-btn" onclick="changeDash('dashMeta', this)">Meta Ads</button>
        <button class="btn-nav" onclick="changeDash('dashGoogle', this)">Google Ads</button>
        <button class="btn-nav" onclick="changeDash('dashLinkedin', this)">LinkedIn</button>
        <button class="btn-nav" onclick="changeDash('dashSearch', this)">Google Search</button>
        <button class="btn-nav" onclick="changeDash('dashGA4', this)">Analytics GA4</button>
    </div>

    <div class="main-content">
        <div class="mouse-blocker"></div>

        <iframe id="dashMeta" class="active" src="https://lookerstudio.google.com/embed/reporting/e7231430-c472-4701-914a-96644445fe42/page/TmTqF?navBar=hidden"></iframe>
        
        <iframe id="dashGoogle" class="background" src="URL_EMBED_GOOGLE?navBar=hidden"></iframe>
        <iframe id="dashLinkedin" class="background" src="URL_EMBED_LINKEDIN?navBar=hidden"></iframe>
        <iframe id="dashSearch" class="background" src="URL_EMBED_SEARCH?navBar=hidden"></iframe>
        <iframe id="dashGA4" class="background" src="URL_EMBED_GA4?navBar=hidden"></iframe>
    </div>

    <script>
        function changeDash(targetId, btnElement) {
            const allIframes = document.querySelectorAll('iframe');
            const allButtons = document.querySelectorAll('.btn-nav');

            allIframes.forEach(iframe => {
                iframe.classList.replace('active', 'background');
            });

            const target = document.getElementById(targetId);
            if(target) {
                target.classList.replace('background', 'active');
            }

            allButtons.forEach(btn => btn.classList.remove('active-btn'));
            btnElement.classList.add('active-btn');
        }
    </script>
</body>
</html>
